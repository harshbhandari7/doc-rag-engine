services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: doc-rag-qdrant
    ports:
      - "6333:6333"   # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage   # persist vectors across restarts
    restart: unless-stopped

volumes:
  qdrant_storage:
